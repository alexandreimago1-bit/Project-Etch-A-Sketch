<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchPad</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>SketchPad</h1>

    <div id="gridContainer" class="gridContainer"></div>

    
        
        <div class="control-group">
            <button id="sizeKnob" class="knob-btn">Size</button>
            <input type="range" id="sizeSlider" class="hidden-slider" min="2" max="64" value="16">
            <span id="sizeValue">16</span>

        <button id="newGridBtn" class="knob-btn">New Grid</button>

        <button id="resetBtn" class="knob-btn">Reset</button>
    </div>

    <script src="Etch.js"></script>
</body>
</html>
